schema: spec-driven

context: |
  ## 项目概述
  Hot Pulse — 抖音创作者内容监控与处理流水线。从 TikHub API 获取创作者视频，经多阶段处理（下载→提取音频→转写→分析），所有状态持久化到飞书多维表格。

  ## 技术栈
  - Python 3.10+，包管理使用 uv
  - httpx（同步模式）：外部 HTTP 调用
  - pydantic / pydantic-settings：数据模型与配置校验
  - pyzmq：仅 patrol_worker 内部使用（计划移除）
  - loguru：日志
  - pyyaml + python-dotenv：配置加载
  - ffmpeg CLI（subprocess）：音频提取
  - OpenVINO + optimum-intel：Whisper GPU 推理（Intel GPU）
  - faster-whisper：CPU 降级路径
  - 部署环境：本机 Windows 11

  ## 架构要点
  - 单进程串行管道：pipeline.py 直接函数调用串联 worker handler，不再经过 ZMQ
  - monitor/ingest 发现新内容后直接调用 pipeline 函数（run_subscription_pipeline / run_manual_pipeline）
  - main.py = 单进程定时调度循环（monitor 定时 + 启动恢复），不再管理子进程
  - 飞书多维表格 = 唯一持久化真相来源，pipeline 通过 TaskManager 管理状态流转
  - Worker 不再作为独立常驻进程运行；handler 函数由 pipeline.py 直接调用
  - WorkerHandler 签名：(Task, AppConfig) -> dict[str, Any]
  - 启动恢复：pipeline.recover_interrupted_tasks() 从飞书查询非终端状态任务并恢复执行
  - patrol_worker 仍作为独立进程运行定时巡检，内部使用 ZMQ（待迁移到 pipeline）

  ## 状态流转
  新视频 → 视频下载中 → 视频下载完成 → 音频提取中 → 音频提取完成 → 文字转写中 → 文字转写完成 → 报告分析中 → 报告分析完成 → 报告推送中 → 报告推送完成
  任何阶段可转入阶段专属失败状态（如"视频下载失败"、"音频提取失败"）
  状态命名规范：交付物+动词+状态（仅"新视频"为例外）

  ## STAGE_MAPPING（task_type → 阶段配置）
  | task_type     | init_status    | running_status | finish_status  | fail_status    | output key   | next_type    |
  |---------------|----------------|----------------|----------------|----------------|--------------|--------------|
  | download      | 新视频         | 视频下载中     | 视频下载完成   | 视频下载失败   | video_file   | extract_audio|
  | extract_audio | 视频下载完成   | 音频提取中     | 音频提取完成   | 音频提取失败   | audio_file   | transcribe   |
  | transcribe    | 音频提取完成   | 文字转写中     | 文字转写完成   | 文字转写失败   | text_file    | analyze      |
  | analyze       | 文字转写完成   | 报告分析中     | 报告分析完成   | 报告分析失败   | report_file  | dingtalk_push|
  | dingtalk_push | 报告分析完成   | 报告推送中     | 报告推送完成   | 报告推送失败   | push_status  | None         |
  | knowledge     | 文字转写完成   | 知识整理中     | 知识整理完成   | 知识整理失败   | obsidian_note| None         |

  ## 配置结构
  - config.yaml（非敏感）：tikhub, feishu, creators, schedule, download_worker, extract_audio_worker, transcribe_worker, analyze_worker, knowledge_worker, dingtalk_worker, patrol_worker
  - .env（敏感）：TIKHUB_API_KEY, FEISHU_APP_ID, FEISHU_APP_SECRET, OPENAI_API_KEY, DINGTALK_SECRET, DINGTALK_WEBHOOK_URL
  - 各 WorkerConfig 为独立配置模型，仅包含该 worker 特有字段（download_dir/audio_dir/text_dir/report_dir 等），不再继承 ZMQ 端点基类

  ## 已实现模块
  - pipeline.py：串行管道编排器，直接调用 worker handler 函数，支持启动恢复
  - monitor.py：监控+飞书写入+调用 run_subscription_pipeline
  - ingest.py：手动提交 CLI + 调用 run_manual_pipeline
  - main.py：单进程定时调度循环（monitor + 启动恢复）
  - download_worker.py：视频下载 handler（httpx 流式+URL 优先级排序+yt-dlp 分流）
  - extract_audio_worker.py：ffmpeg 提取 MP3 handler
  - transcribe_worker.py：音频转文字 handler（OpenVINO GPU + faster-whisper CPU 降级，本地模型缓存）
  - analyze_worker.py：内容分析生成报告 handler（OpenAI 兼容 API）
  - knowledge_worker.py：知识笔记整理 handler（LLM → Obsidian vault）
  - dingtalk_worker.py：钉钉群消息推送 handler（Webhook 加签、流控）
  - patrol_worker.py：定时巡检，检测僵尸/失败任务并恢复（内部暂用 ZMQ，待迁移）
  - task.py：Task 数据模型
  - task_manager.py：TaskManager + STAGE_MAPPING
  - feishu.py：飞书 API 客户端
  - config.py：配置模型与加载

  ## 外部服务
  - TikHub API：/api/v1/douyin/app/v3/fetch_user_post_videos（参数名 sec_user_id，视频列表字段 aweme_list，视频 ID 字段 aweme_id）
  - 飞书开放平台：多维表格 CRUD，"状态"字段类型为单选(type=3)
  - OpenAI 兼容 LLM API（默认 DeepSeek）：analyze_worker + knowledge_worker 共用
  - 钉钉自定义机器人 Webhook：Markdown 消息推送，加签认证（HMAC-SHA256）

  ## 约定
  - OpenSpec artifacts 全部使用中文
  - pip install 使用阿里云镜像 https://mirrors.aliyun.com/pypi/simple/
  - 不需要飞书消息通知

rules:
  proposal:
    - proposal 使用中文撰写
    - 明确说明变更的目的、范围和非目标（Non-goals）
    - 如果涉及新 worker，说明其在流水线中的位置和上下游关系
  design:
    - design 使用中文撰写
    - 描述技术方案、关键决策和模块交互
    - 新 worker 的 design 必须说明：handler 输入输出、外部依赖、错误处理策略
    - 如果涉及配置变更，列出具体的配置模型修改
  specs:
    - spec 使用中文撰写
    - 使用 "系统 SHALL" 风格描述需求
    - 每个 Requirement 下用 Scenario 覆盖正常路径和异常路径
    - 新 worker 的 spec 必须包含在 extract-audio-worker 或对应目录下
    - 配置相关的变更必须同步更新 config-management spec
  tasks:
    - tasks 使用中文撰写
    - 每个任务粒度控制在可独立验证的范围
    - 新建文件和修改已有文件分列不同的任务
    - 如果涉及 config.yaml 或 config.py 的变更，列为显式任务
